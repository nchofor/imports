<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request a Quote — SwiftShip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Instrument+Sans:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="utility-bar">
    <div class="container utility-inner">
      <span class="utility-item">+237 699 123 456</span>
      <a href="track.html" class="utility-link">Track shipment →</a>
    </div>
  </div>

  <header class="site-header">
    <div class="container header-container">
      <a href="index.html" class="logo">Swift<span>Ship</span></a>
      <button class="nav-toggle" type="button" aria-label="Open menu" aria-expanded="false"><span></span><span></span><span></span></button>
      <nav class="main-nav" aria-label="Main navigation">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="index.html#freight">Freight</a></li>
          <li><a href="track.html">Track</a></li>
          <li><a href="booking.html" class="nav-cta">Get a quote</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="page-hero page-hero--quote">
    <div class="container">
      <p class="section-label section-label--light">Freight quote</p>
      <h1>Request a shipping quote</h1>
      <p>Complete the form below and our logistics team will respond within one business day.</p>
    </div>
  </section>

  <section class="page-content">
    <div class="container page-narrow">
      <form id="quoteForm" class="shipping-form">
        <div class="form-section">
          <h2>Contact details</h2>
          <div class="form-grid">
            <div class="form-row">
              <label for="q-name">Full name</label>
              <input type="text" id="q-name" name="name" required>
            </div>
            <div class="form-row">
              <label for="q-email">Work email</label>
              <input type="email" id="q-email" name="email" required>
            </div>
            <div class="form-row">
              <label for="q-phone">Phone</label>
              <input type="tel" id="q-phone" name="phone" placeholder="+237 ...">
            </div>
            <div class="form-row">
              <label for="q-company">Company (optional)</label>
              <input type="text" id="q-company" name="company">
            </div>
          </div>
        </div>

        <div class="form-section">
          <h2>Shipment details</h2>
          <div class="form-grid">
            <div class="form-row">
              <label for="q-pickup">Pickup location</label>
              <input type="text" id="q-pickup" name="pickup" placeholder="City, country" required>
            </div>
            <div class="form-row">
              <label for="q-delivery">Delivery location</label>
              <input type="text" id="q-delivery" name="delivery" placeholder="City, country" required>
            </div>
            <div class="form-row">
              <label for="q-service">Service type</label>
              <select id="q-service" name="service" required>
                <option value="">Select service</option>
                <option value="air">Air freight</option>
                <option value="ocean">Ocean freight</option>
                <option value="road">Road freight</option>
                <option value="parcel">Parcel / express</option>
              </select>
            </div>
            <div class="form-row">
              <label for="q-weight">Weight (kg)</label>
              <input type="number" id="q-weight" name="weight" min="0.1" step="0.1" required>
            </div>
            <div class="form-row form-row--full">
              <label for="q-package">Cargo description</label>
              <textarea id="q-package" name="package" rows="3" placeholder="Dimensions, quantity, special handling..." required></textarea>
            </div>
            <div class="form-row">
              <label for="q-date">Preferred ship date</label>
              <input type="date" id="q-date" name="date" required>
            </div>
          </div>
        </div>

        <button type="submit" class="btn primary-btn btn-block">Submit quote request</button>
        <p id="quoteResult" class="form-result" role="status"></p>
      </form>
    </div>
  </section>

  <footer class="site-footer">
    <div class="container footer-bottom">
      <p>&copy; 2025 SwiftShip Logistics. <a href="index.html">Home</a></p>
    </div>
  </footer>

  <script src="main.js"></script>
</body>
</html>
